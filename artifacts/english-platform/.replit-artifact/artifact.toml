kind = "web"
previewPath = "/"
title = "English Learning Platform"
version = "1.0.0"
id = "artifacts/english-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20186

[services.development]
run = "pnpm --filter @workspace/english-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english-platform", "run", "build" ]
publicDir = "artifacts/english-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20186"
BASE_PATH = "/"
